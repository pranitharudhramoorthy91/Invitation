<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Menyaazhini's Birthday Invitation 🎂 </title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #a1c4fd 100%);
            color: #333;
            text-align: center;
            overflow-x: hidden;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            padding: 40px 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        h1 {
            font-size: 3.5rem;
            color: #e91e63;
            animation: bounce 2s infinite;
            margin: 10px 0;
        }
        .subtitle {
            font-size: 1.8rem;
            color: #ff5722;
            animation: slideIn 1.5s ease-out forwards;
            opacity: 0;
        }
        .details {
            font-size: 1.5rem;
            line-height: 1.8;
            margin: 30px 0;
            animation: fadeIn 2s ease-in forwards;
            opacity: 0;
        }
        button {
            background: #ff4081;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
        }
        button:hover {
            background: #f50057;
            transform: scale(1.1);
        }
        .emoji {
            font-size: 4rem;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes slideIn {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="emoji">🎈🎉🎂🎁🎈</p>
        <h1>Welcome to Our Princess Birthday Celebration!</h1>
       <!--p class="subtitle">Special Birthday Celebration</p-->
        
        <div class="details">
            📅 <strong>Date:</strong> 20 November 2026<br>
            ⏰ <strong>Time:</strong> 6:00 PM onwards<br>
            📍 <strong>Venue:</strong> [Your Venue / Home Address]<br><br>
            <strong>Let's celebrate with fun, food & lots of laughter! 🎉</strong>
        </div>

        <button onclick="launchConfetti()">Yes, I'll Come! 🎉</button>
        <p>RSVP soon • Call/WhatsApp: +91-XXXXXXXXXX</p>
    </div>

    <script>
        function launchConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
            setTimeout(() => {
                confetti({
                    particleCount: 100,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
            }, 300);
            alert("🎉 Thank you! See you at the party!");
        }

        // Auto confetti when page loads (optional - remove if too much)
        window.onload = function() {
            setTimeout(() => {
                confetti({
                    particleCount: 80,
                    spread: 100,
                    origin: { y: 0.7 }
                });
            }, 800);
        };
    </script>
</body>
</html>
