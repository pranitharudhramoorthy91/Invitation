<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Pranitha's Birthday Invitation 🎂</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://source.unsplash.com/random/1600x900/?birthday,party') center/cover no-repeat fixed;
            color: white;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        .header {
            margin-bottom: 30px;
        }
        h1 {
            font-size: 3.8rem;
            animation: bounce 2.5s infinite;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 2rem;
            margin: 15px 0;
            animation: slideIn 2s ease-out forwards;
            opacity: 0;
        }
        .details {
            font-size: 1.55rem;
            line-height: 2;
            margin: 35px 0;
            animation: fadeIn 2.5s ease-in forwards;
            opacity: 0;
        }
        .emoji {
            font-size: 4.5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        button {
            background: #ff4081;
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 0;
            box-shadow: 0 8px 20px rgba(255, 64, 129, 0.4);
            transition: all 0.4s;
        }
        button:hover {
            transform: scale(1.12);
            background: #f50057;
        }
        .rsvp {
            margin-top: 30px;
            font-size: 1.3rem;
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes slideIn {
            from { transform: translateX(-80px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <p class="emoji">🎈 🎉 🎂 🎁 🎈</p>
            <h1>You're Invited!</h1>
            <p class="subtitle">Birthday Celebration</p>
        </div>

        <div class="details">
            📅 <strong>Date:</strong> 15 April 2026<br>
            ⏰ <strong>Time:</strong> 6:00 PM onwards<br>
            📍 <strong>Venue:</strong> [Your Venue / Home Address Here]<br><br>
            <strong>Come, celebrate, enjoy delicious food & create beautiful memories with us! 💖</strong>
        </div>

        <button onclick="launchConfetti()">Yes, I'll Be There! 🎉</button>

        <div class="rsvp">
            Please RSVP by 10th April<br>
            Call / WhatsApp: +91-XXXXXXXXXX
        </div>
    </div>

    <script>
        function launchConfetti() {
            confetti({
                particleCount: 200,
                spread: 80,
                origin: { y: 0.6 }
            });
            setTimeout(() => {
                confetti({
                    particleCount: 120,
                    angle: 60,
                    spread: 70,
                    origin: { x: 0.1 }
                });
            }, 250);
            alert("🎉 Thank you! Can't wait to celebrate with you!");
        }

        // Light confetti when page loads
        window.onload = () => {
            setTimeout(() => {
                confetti({
                    particleCount: 80,
                    spread: 100,
                    origin: { y: 0.8 }
                });
            }, 1200);
        };
    </script>
</body>
</html>
