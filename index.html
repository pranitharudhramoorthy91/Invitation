<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 You're Invited! 🎂</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .card {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px 20px;
        }
        h1 {
            font-size: 3rem;
            color: #e91e63;
            margin: 0;
        }
        h2 {
            color: #ff5722;
        }
        .details {
            font-size: 1.4rem;
            margin: 30px 0;
            line-height: 1.6;
        }
        .emoji {
            font-size: 4rem;
            animation: bounce 2s infinite;
        }
        button {
            background: #ff4081;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #f50057;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="card">
        <p class="emoji">🎈 🎉 🎂 🎈</p>
        <h1>You're Invited!</h1>
        <h2>Pranitha's Birthday Celebration</h2>
        
        <div class="details">
            📅 <strong>Date:</strong> 15th April 2026<br>
            ⏰ <strong>Time:</strong> 6:00 PM onwards<br>
            📍 <strong>Venue:</strong> Your Home / [Your Location]<br><br>
            <strong>Let's make this day unforgettable! 🎁</strong>
        </div>
        
        <p>RSVP by 10th April<br>
        Call / WhatsApp: +91-XXXXXXXXXX</p>
        
        <button onclick="alert('🎉 Thank you! See you at the party!')">Yes, I'll be there! 🎉</button>
    </div>
</body>
</html>
